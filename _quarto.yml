project:
  type: book
  output-dir: docs

book:
  title: "Curso R para Análise de Dados"
  subtitle: "Do zero ao relatório técnico em 4 dias"
  author: "Ítalo Cegatta"
  date: "2026"
  language: pt
  chapters:
    - index.qmd
    - part: "1 dia"
      chapters:
        - 01-dia/index.qmd
        - 01-dia/d1-manha-parte1.qmd
        - 01-dia/d1-manha-parte2.qmd
        - 01-dia/d1-tarde.qmd
    - part: "2 dias"
      chapters:
        - 02-dias/index.qmd
        - 02-dias/d1-manha.qmd
        - 02-dias/d1-tarde.qmd
        - 02-dias/d2-manha.qmd
        - 02-dias/d2-tarde.qmd
        - 02-dias/d2-tarde-parte2.qmd
    - part: "4 dias"
      chapters:
        - 04-dias/index.qmd
        - 04-dias/d1-manha.qmd
        - 04-dias/d1-tarde.qmd
        - 04-dias/d2-manha.qmd
        - 04-dias/d2-tarde.qmd
        - 04-dias/d3-manha.qmd
        - 04-dias/d3-tarde.qmd
        - 04-dias/d4-manha.qmd
        - 04-dias/d4-tarde.qmd

  page-footer:
    left: |
      Curso R para Análise de Dados — Ítalo Cegatta
    right: |
      Licença CC BY-NC 4.0

  sidebar:
    style: docked
    collapse-level: 2

format:
  html:
    theme:
      light: [flatly, custom.scss]
    toc: true
    toc-depth: 3
    number-sections: false
    code-copy: true
    code-line-numbers: true
    code-block-border-left: "#18BC9C"
    highlight-style: arrow

  pdf:
    documentclass: scrbook
    toc: true
    toc-depth: 2
    number-sections: true
    include-in-header:
      text: |
        \usepackage[brazil]{babel}
        \usepackage{fontspec}
        \setmainfont{Latin Modern Roman}

execute:
  warning: false
  echo: true
  message: false
  cache: false
  before: /home/italo/curso_r_v2/_util.R

language:
  pt:
    title-block-published: "Atualizado em"
    toc-title-document: "Sumário"
    toc-title-website: "Neste capítulo"
    callout-tip-title: "💡 Dica"
    callout-note-title: "📝 Nota"
    callout-warning-title: "⚠️ Atenção"
    callout-important-title: "🔑 Importante"
    callout-caution-title: "🚨 Cuidado"
